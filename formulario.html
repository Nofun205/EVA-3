<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación WebApp - Formulario</title>

    <!-- Librerías CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mi WebApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio (Tabla)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="formulario.html">Nuevo Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido del Formulario -->
    <main class="container mt-4">
        <h2>Registro de Nuevo Usuario</h2>
        <hr>
        
        <form id="formUsuario" class="mt-4" novalidate>
            <!-- Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre *</label>
                <input type="text" class="form-control" id="nombre">
                <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>

            <!-- Usuario -->
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario *</label>
                <input type="text" class="form-control" id="usuario">
                <div class="invalid-feedback">El usuario es obligatorio.</div>
            </div>

            <!-- Fecha Ingreso -->
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha de Ingreso *</label>
                <input type="date" class="form-control" id="fecha">
                <div class="invalid-feedback">Debe ingresar una fecha (dd/mm/yyyy).</div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" placeholder="usuario@servidor.dom">
                <div class="invalid-feedback">Debe ingresar un correo electrónico válido.</div>
            </div>

            <!-- Sitio Web -->
            <div class="mb-3">
                <label for="sitioweb" class="form-label">Sitio Web</label>
                <input type="url" class="form-control" id="sitioweb">
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2 mt-4 mb-5">
                <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
                <button type="button" id="btnEnviar" class="btn btn-primary">Enviar</button>
            </div>
        </form>
    </main>

    <!-- Librerías JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Lógica Propia -->
    <script src="main.js"></script>
</body>
</html>
